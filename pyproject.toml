[dependency-groups]
dev = ["ruff>=0.14.6", "ty>=0.0.32"]

[tool.uv.workspace]
members = ["documentation", "package", "example"]

[tool.uv.sources]
solie = { workspace = true }
documentation = { workspace = true }
usage = { workspace = true }

[tool.ty.rules]
all = "error"

[tool.ty.environment]
extra-paths = ["package"]

[tool.ty.src]
exclude = ["package/solie/window/compiled.py"]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]
ignore = ["TC", "BLE", "FBT", "PGH003", "ANN401", "S102", "S301"]
exclude = ["package/solie/window/compiled.py"]

[tool.ruff.lint.per-file-ignores]
"documentation/**/*.py" = ["A001"]
